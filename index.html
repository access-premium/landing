<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  height:100%;
  background:#1c1c1e;
  color:#fff;
  font-family:'Bricolage Grotesque',sans-serif;
  -webkit-font-smoothing:antialiased;
}
body{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  padding:40px 24px;
  text-align:center;
}

.wrap{max-width:420px;width:100%}

h1{
  font-size:clamp(36px,10vw,58px);
  font-weight:800;
  line-height:1.08;
  letter-spacing:-2px;
  margin-bottom:36px;
  color:#fff;
  animation:up .5s ease both;
}

h1 span{
  color:rgba(255,255,255,.35);
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  background:#22c55e;
  color:#000;
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:17px;
  font-weight:800;
  padding:20px 32px;
  border-radius:14px;
  text-decoration:none;
  width:100%;
  letter-spacing:-.3px;
  animation:up .5s ease .15s both;
  transition:opacity .15s,transform .15s;
}
.btn:hover{opacity:.9;transform:translateY(-2px)}
.btn:active{transform:scale(.98)}

.arr{transition:transform .2s}
.btn:hover .arr{transform:translateX(4px)}

@keyframes up{
  from{opacity:0;transform:translateY(18px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>
<div class="wrap">
  <h1>Les mêmes produits<br><span>que les influenceurs.</span><br>Des prix que les<br><span>boutiques ne pratiquent pas.</span></h1>
  <a href="https://www.mrfournisseur.com" class="btn" id="cta">
    Accéder aux fournisseurs <span class="arr">→</span>
  </a>
</div>
<script>
if(typeof ttq!=='undefined'){
  ttq.track('ViewContent',{contents:[{content_id:'bridge',content_type:'product',content_name:'Acces Premium'}],value:67.99,currency:'EUR'});
}
document.getElementById('cta').addEventListener('click',function(){
  if(typeof ttq!=='undefined'){
    ttq.track('InitiateCheckout',{contents:[{content_id:'bridge',content_type:'product',content_name:'Acces Premium'}],value:67.99,currency:'EUR'});
  }
});
</script>
</body>
</html>
