<style>
*{box-sizing:border-box;margin:0;padding:0}

html,body{
  height:100%;
  overflow:hidden;
  background:#1c1c1e;
  color:#fff;
  font-family:'Bricolage Grotesque',sans-serif;
  -webkit-font-smoothing:antialiased;
  touch-action:none;
  overscroll-behavior:none;
}

body{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100dvh;
  padding:32px 28px;
  text-align:center;
  gap:0;
}

body::before{
  content:'';
  position:fixed;
  top:-100px;
  left:50%;
  transform:translateX(-50%);
  width:600px;
  height:300px;
  background:radial-gradient(ellipse, rgba(34,197,94,.08) 0%, transparent 70%);
  pointer-events:none;
}

.live{
  display:inline-flex;
  align-items:center;
  gap:7px;
  border:1px solid rgba(255,255,255,.12);
  border-radius:100px;
  padding:6px 14px;
  font-size:11px;
  font-weight:600;
  color:rgba(255,255,255,.45);
  letter-spacing:.3px;
  margin-bottom:28px;
  animation:fadeUp .4s ease both;
}
.dot{
  width:6px;height:6px;
  border-radius:50%;
  background:#22c55e;
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

h1{
  font-size:clamp(32px,9vw,54px);
  font-weight:800;
  line-height:1.06;
  letter-spacing:-2px;
  margin-bottom:10px;
  animation:fadeUp .4s ease .1s both;
}

.muted{color:rgba(255,255,255,.35)}

.sub{
  font-size:14px;
  font-weight:400;
  color:rgba(255,255,255,.4);
  margin-bottom:36px;
  line-height:1.5;
  animation:fadeUp .4s ease .15s both;
}

.btn{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  background:#22c55e;
  color:#000;
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:17px;
  font-weight:800;
  padding:20px 28px;
  border-radius:14px;
  text-decoration:none;
  width:100%;
  max-width:400px;
  letter-spacing:-.3px;
  animation:fadeUp .4s ease .2s both, pulse-btn 2.5s ease 1.2s infinite;
  position:relative;
  overflow:hidden;
}

.btn::after{
  content:'';
  position:absolute;
  top:0;left:-100%;
  width:60%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:shimmer 2.5s ease 1s infinite;
}
@keyframes shimmer{
  0%{left:-100%}
  50%,100%{left:150%}
}

@keyframes pulse-btn{
  0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}
  50%{box-shadow:0 0 0 10px rgba(34,197,94,0)}
}

.btn:active{transform:scale(.97)}

.arr{
  font-size:18px;
  transition:transform .2s;
}
.btn:hover .arr{transform:translateX(4px)}

.trust{
  margin-top:20px;
  font-size:11px;
  color:rgba(255,255,255,.2);
  letter-spacing:.4px;
  animation:fadeUp .4s ease .3s both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(14px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>
<body>

<div class="live"><span class="dot"></span>+3 000 membres actifs en France</div>

<h1>Les prix que les<br><span class="muted">boutiques te cachent.</span></h1>

<a href="https://www.mrfournisseur.com" class="btn" id="cta">
  Accéder aux fournisseurs <span class="arr">→</span>
</a>

<div class="trust">🔒 Accès sécurisé · Disponible maintenant</div>

<script>
// Événement : arrivée sur la landing page (neutre, pas de prix)
if(typeof ttq !== 'undefined'){
  ttq.track('Landing', {
    contents:[{content_id:'landing-bridge', content_name:'Landing Page Bridge'}]
  });
}

// Événement : clic sur le bouton (pas de confusion avec achat)
document.getElementById('cta').addEventListener('click', function(){
  if(typeof ttq !== 'undefined'){
    ttq.track('ClickButton', {
      contents:[{content_id:'landing-bridge', content_name:'Clic vers MisterFournisseur'}]
    });
  }
});
</script>

</body>
</html>
